<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HashDice - 幸运轮盘</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body {
  background: #0c0c1a;
  background-image: radial-gradient(circle at 20% 20%, rgba(48,32,100,0.35), transparent 45%),
                    radial-gradient(circle at 80% 80%, rgba(22,12,60,0.4), transparent 45%);
  color: #fff;
  min-height: 100vh;
}
.card {
  background: rgba(22,22,40,0.65);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.25);
}
.card-glow::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 20px;
  padding: 1px;
  background: linear-gradient(135deg, #4f46e5, #06b6d4, #4f46e5);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  opacity: 0.4;
  pointer-events: none;
}
.btn-primary {
  background: linear-gradient(90deg, #4f46e5, #06b6d4);
  border-radius: 14px;
  transition: all 0.25s ease;
}
.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 0 18px rgba(79,70,229,0.35);
}
.btn-success {
  background: linear-gradient(90deg, #10b981, #059669);
  border-radius: 14px;
  transition: all 0.25s ease;
}
.btn-option {
  background: rgba(30,30,60,0.5);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
}
.stat-box {
  background: rgba(26,26,44,0.5);
  border-radius: 16px;
  backdrop-filter: blur(10px);
}
.wheel-box {
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
}
.wheel {
  width: 320px;
  height: 320px;
  border-radius: 999px;
  position: relative;
  background: conic-gradient(
    #ef4444 0deg 60deg,
    #1f2937 60deg 120deg,
    #0ea5e9 120deg 180deg,
    #10b981 180deg 240deg,
    #8b5cf6 240deg 300deg,
    #f59e0b 300deg 360deg
  );
  transition: transform 4.2s cubic-bezier(0.1,0.7,0.1,1);
}
.wheel::after {
  content: "";
  position: absolute;
  width: 26px; height: 26px;
  background: #fff;
  border-radius: 50%;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  box-shadow: 0 0 16px rgba(255,255,255,0.8);
}
.pointer {
  position: absolute;
  top: -14px;
  left: 50%;
  transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 16px solid transparent;
  border-right: 16px solid transparent;
  border-top: 28px solid #fff;
  z-index: 10;
  filter: drop-shadow(0 0 10px rgba(255,255,255,0.8));
}
.wheel-text {
  position: absolute;
  width: 100%; height: 100%;
  text-align: center;
  font-size: 14px; font-weight: bold;
  color: #fff;
  text-shadow: 0 1px 4px #000;
}
.wheel-text span {
  position: absolute;
  transform-origin: center 160px;
  white-space: nowrap;
}
.spinning {
  animation: spin 4.2s cubic-bezier(0.1,0.7,0.1,1) forwards;
}
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(2280deg); }
}
.marquee {
  background: rgba(30,30,60,0.4);
  border-radius: 12px; padding: 10px 16px;
  white-space: nowrap; overflow: hidden;
}
.marquee span {
  display: inline-block;
  animation: marquee 14s linear infinite;
}
@keyframes marquee {
  0% { transform: translateX(100%); }
  100% { transform: translateX(-100%); }
}
</style>
</head>
<body class="p-4 max-w-4xl mx-auto pb-24">

<div class="flex items-center justify-between mb-5">
  <div class="text-xl font-bold">HashDice</div>
  <div class="flex gap-3">
    <button class="px-4 py-2 btn-option text-sm" onclick="location.href='index.html'">竞猜</button>
    <button class="px-4 py-2 btn-primary text-sm">轮盘</button>
  </div>
</div>

<div class="marquee mb-5 text-sm">
  <span>🎉 恭喜用户 0x87** 赢得 5 倍大奖！｜ 平台抽水 2.5%，邀请返佣 10% 实时到账｜公平可验</span>
</div>

<div class="card card-glow p-5 mb-6 text-center">
  <button id="connectBtn" class="px-5 py-2.5 btn-primary text-sm">连接钱包</button>
  <div id="addr" class="text-gray-400 text-xs mt-3">未连接</div>
</div>

<div class="grid grid-cols-3 gap-3 mb-6">
  <div class="stat-box p-4 text-center"><div class="text-xs text-gray-400">BNB</div><div id="bnbBal">0.0000</div></div>
  <div class="stat-box p-4 text-center"><div class="text-xs text-gray-400">USDT</div><div id="usdtBal">0.0000</div></div>
  <div class="stat-box p-4 text-center"><div class="text-xs text-gray-400">HASH</div><div id="hashBal">0.0000</div></div>
</div>

<div class="card card-glow p-6 mb-6">
  <div class="wheel-box">
    <div class="pointer"></div>
    <div id="wheel" class="wheel">
      <div class="wheel-text">
        <span style="transform: rotate(30deg)">谢谢</span>
        <span style="transform: rotate(90deg)">90%</span>
        <span style="transform: rotate(150deg)">1.2x</span>
        <span style="transform: rotate(210deg)">1.5x</span>
        <span style="transform: rotate(270deg)">2x</span>
        <span style="transform: rotate(330deg)">5x</span>
      </div>
    </div>
  </div>
</div>

<div class="card p-6 mb-6">
  <input id="amt" value="0.01" class="w-full p-4 rounded-xl bg-[#121225] border border-white/10 mb-4 text-lg">
  <select id="token" class="w-full p-4 rounded-xl bg-[#121225] border border-white/10 mb-5 text-lg">
    <option value="BNB">BNB</option><option value="USDT">USDT</option><option value="HASH">HASH</option>
  </select>
  <button id="spin" class="w-full py-4 btn-success text-lg">开始旋转</button>
</div>

<script>
let provider, signer, user;
const prizes = ["谢谢参与","本金90%","1.2倍","1.5倍","2倍","5倍大奖"];
async function connect(){
  if(!window.ethereum)return alert('请安装MetaMask');
  provider = new ethers.BrowserProvider(window.ethereum);
  await provider.send("eth_requestAccounts",[]);
  signer = await provider.getSigner();
  user = await signer.getAddress();
  addr.innerText = user.slice(0,6)+'...'+user.slice(-4);
}
connectBtn.onclick = connect;

spin.onclick = ()=>{
  if(!user)return alert('请先连接钱包');
  wheel.classList.add('spinning');
  setTimeout(()=>{
    wheel.classList.remove('spinning');
    alert('🎊 结果：'+prizes[Math.floor(Math.random()*6)]);
  },4200);
}
</script>
</body>
</html>
