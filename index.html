<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HashDice 赌场</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
<script>
tailwind.config = { theme: { extend: { colors: { primary:'#165DFF',casino:'#0E9F6E',dark:'#111827',card:'#1F2937',success:'#10B981',danger:'#EF4444',warning:'#F59E0B' } } } }
</script>
<style>
@keyframes diceShake {0%{transform:rotate(0deg)}25%{transform:rotate(12deg)}50%{transform:rotate(-12deg)}75%{transform:rotate(6deg)}100%{transform:rotate(0deg)}}
@keyframes winFlash {0%{background:#10B981}50%{background:#16A34A}100%{background:#10B981}}
@keyframes slotRoll {0%{transform:translateY(0)}100%{transform:translateY(-300px)}}
@keyframes numberCount {from{opacity:0.2}to{opacity:1}}
.dice-shake{animation:diceShake 0.6s ease}
.win-flash{animation:winFlash 0.8s infinite alternate}
.slot-roll{animation:slotRoll 1s ease-in-out}
.number-animate{animation:numberCount 0.5s ease}
.glow{box-shadow:0 0 24px rgba(16,185,129,0.5)}
</style>
</head>
<body class="bg-dark text-gray-100 min-h-screen" style="background:linear-gradient(140deg,#111827,#064E3B,#111827)">
<div class="max-w-6xl mx-auto px-4 py-8">

<div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-3">
  <h1 id="title" class="text-[clamp(1.5rem,4vw,2.5rem)] font-bold text-casino flex items-center gap-2">🎰 HashDice 赌场</h1>
  <div class="flex items-center gap-3 flex-wrap">
    <select id="langSwitch" class="bg-card text-sm px-2 py-1 rounded-lg border border-gray-700"><option value="zh">中文</option><option value="en">English</option></select>
    <div class="text-sm px-3 py-1 bg-card rounded-full text-green-400"><span id="onlineLabel">在线人数:</span> <span id="onlineCount">0</span></div>
    <span id="network" class="text-sm px-3 py-1 bg-card rounded-full">未连接</span>
    <button id="connectBtn" class="bg-casino hover:brightness-110 px-5 py-2 rounded-xl font-medium transition">连接钱包</button>
  </div>
</div>

<div class="bg-card rounded-2xl p-4 mb-6 shadow-lg glow">
  <div class="flex flex-wrap items-center justify-between gap-2 text-sm">
    <div><span id="addrLabel">地址:</span> <span id="address" class="text-green-300 font-mono">-</span></div>
    <div>BNB: <span id="bnbBal" class="text-success">-</span></div>
    <div>USDT: <span id="usdtBal" class="text-success">-</span></div>
    <div>HASH: <span id="hashBal" class="text-success">-</span></div>
  </div>
</div>

<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
  <div class="bg-card p-4 rounded-xl shadow text-center"><p id="totalBetLabel" class="text-gray-400 text-sm">总下注</p><p id="totalBets" class="text-xl font-bold number-animate">0</p></div>
  <div class="bg-card p-4 rounded-xl shadow text-center"><p id="winRateLabel" class="text-gray-400 text-sm">胜率</p><p id="winRate" class="text-xl font-bold text-casino number-animate">0%</p></div>
  <div class="bg-card p-4 rounded-xl shadow text-center"><p id="profitLabel" class="text-gray-400 text-sm">净盈亏</p><p id="profit" class="text-xl font-bold text-success number-animate">0</p></div>
</div>

<div class="bg-card rounded-2xl p-6 mb-6 shadow-lg text-center relative overflow-hidden">
  <div id="slotBox" class="h-16 flex items-center justify-center text-3xl font-bold tracking-widest text-yellow-400">🎉 欢迎来到赌场</div>
</div>

<div class="bg-card rounded-2xl p-4 mb-6 shadow-lg">
  <div class="flex flex-col md:flex-row justify-between items-center gap-3">
    <div><p id="refLabel" class="text-sm text-gray-400">你的邀请链接</p><input id="refLink" readonly class="mt-1 bg-gray-800 border border-gray-700 rounded-xl p-2 w-full md:w-96 text-sm"></div>
    <button id="copyRef" class="bg-primary hover:brightness-110 px-4 py-2 rounded-xl">复制链接</button>
  </div>
</div>

<div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
  <div class="bg-card rounded-2xl p-6 shadow-lg md:col-span-2 glow" id="gameBox">
    <h2 id="betAreaLabel" class="text-xl font-semibold mb-4 flex items-center gap-2"><i class="fa fa-gamepad"></i> 下注区</h2>
    <div class="mb-4"><label id="tokenLabel" class="text-sm text-gray-300 block mb-1">选择代币</label><select id="tokenType" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3"><option value="BNB">BNB</option><option value="USDT">USDT</option><option value="HASH">HASH</option></select></div>
    <div class="mb-4"><label id="amountLabel" class="text-sm text-gray-300 block mb-1">下注金额</label><input id="amount" type="number" step="0.0001" value="0.01" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3"></div>
    <div class="grid grid-cols-2 gap-3 mb-4"><button id="betSmall" class="bg-blue-700 hover:brightness-110 p-4 rounded-xl text-lg font-bold transition">🎲 小 0-4</button><button id="betBig" class="bg-purple-700 hover:brightness-110 p-4 rounded-xl text-lg font-bold transition">🎲 大 5-9</button></div>
    <div class="text-xs text-gray-400 space-y-1"><p id="oddsLabel">赔率：1.95x | 手续费：2.5%</p><p id="refRewardLabel">邀请返佣：下级下注 10% 佣金</p></div>
  </div>

  <div class="bg-card rounded-2xl p-6 shadow-lg">
    <h2 id="adminLabel" class="text-xl font-semibold mb-4 flex items-center gap-2"><i class="fa fa-shield"></i> 管理员后台</h2>
    <div class="space-y-3 mb-4"><input id="withdrawAmt" placeholder="提取数量" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3"><button id="wBNB" class="w-full bg-warning hover:brightness-110 p-3 rounded-xl">提取 BNB</button><button id="wUSDT" class="w-full bg-warning hover:brightness-110 p-3 rounded-xl">提取 USDT</button><button id="wHASH" class="w-full bg-warning hover:brightness-110 p-3 rounded-xl">提取 HASH</button></div>
    <div class="border-t border-gray-700 pt-4 mb-4"><p id="controlLabel" class="text-sm mb-2 text-red-400">控奖开关</p><select id="forceResult" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-2 mb-1"><option value="0">正常随机</option><option value="1">强制赢</option><option value="2">强制输</option></select></div>
    <div class="border-t border-gray-700 pt-4"><p id="feeLabel" class="text-sm mb-2 text-yellow-400">抽水比例设置</p><input id="feeRate" type="number" placeholder="%" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-2 mb-1"><button id="saveFee" class="w-full bg-primary hover:brightness-110 p-2 rounded-xl">保存设置</button></div>
  </div>
</div>

<div class="bg-card rounded-2xl p-6 shadow-lg">
  <h2 id="historyLabel" class="text-xl font-semibold mb-4 flex items-center gap-2"><i class="fa fa-history"></i> 历史记录</h2>
  <div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="border-b border-gray-700"><th class="text-left py-2">ID</th><th class="text-left py-2">代币</th><th class="text-left py-2">金额</th><th class="text-left py-2">大小</th><th class="text-left py-2">结果</th><th class="text-left py-2">操作</th></tr></thead><tbody id="historyBody"><tr><td colspan="6" class="py-4 text-center text-gray-500">请连接钱包</td></tr></tbody></table></div>
</div>

</div>

<audio id="betSound" src="https://assets.mixkit.co/active_storage/sfx/2359/2359-preview.mp3" preload="auto">
<audio id="winSound" src="https://assets.mixkit.co/active_storage/sfx/2014/2014-preview.mp3" preload="auto">
<audio id="slotSound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto">

<script>
// ==========================
// ✅ 地址已全部替换完成！
const CONTRACT_ADDRESS = "0x98BAf0364f737707a9D5b0b671b76862052B6740";
const USDT_ADDRESS    = "0x337610d27c682E347C9cD60BD4b3b107C9d34dD";
const HASH_ADDRESS    = "0xa61be03349C256dA83C4593086BD2db88dc7578E";
// ==========================

const ABI = [
  "function placeBetBNB(uint8) external payable returns(uint256)",
  "function placeBetUSDT(uint8,uint256) external returns(uint256)",
  "function placeBetHASH(uint8,uint256) external returns(uint256)",
  "function settleBet(uint256) external",
  "function bets(uint256) view returns(address,uint256,uint8,uint256,uint8,uint256,uint8)",
  "function nextBetId() view returns(uint256)",
  "function withdrawPlatformFees(uint8,uint256) external",
  "function owner() view returns(address)",
];

const ERC20_ABI = [
  "function approve(address,uint256) external returns(bool)",
  "function balanceOf(address) view returns(uint256)",
  "function decimals() view returns(uint8)"
];

let provider, signer, contract, userAddress;
let usdtContract, hashContract, usdtDecimals=18, hashDecimals=18;
let isOwner = false;
let lang = "zh";

const betSound = document.getElementById("betSound");
const winSound = document.getElementById("winSound");
const slotSound = document.getElementById("slotSound");

const i18n = {
  zh: {online:"在线人数",addr:"地址",total:"总下注",winRate:"胜率",profit:"净盈亏",ref:"邀请链接",betArea:"下注区",token:"代币",amount:"金额",small:"小",big:"大",odds:"赔率：1.95x | 手续费：2.5%",refReward:"邀请返佣：下级下注10%佣金",admin:"管理员后台",control:"控奖开关",fee:"抽水比例设置",history:"历史记录",connect:"连接钱包",connected:"已连接",network:"BSC测试网",copy:"复制链接"},
  en: {online:"Online",addr:"Addr",total:"Total Bets",winRate:"Win Rate",profit:"Profit",ref:"Referral Link",betArea:"Bet Area",token:"Token",amount:"Amount",small:"Small",big:"Big",odds:"Odds 1.95x | Fee 2.5%",refReward:"Referral 10% Commission",admin:"Admin",control:"Result Control",fee:"Fee Rate",history:"History",connect:"Connect Wallet",connected:"Connected",network:"BSC Testnet",copy:"Copy Link"}
};

document.getElementById("langSwitch").onchange = (e)=>{ lang = e.target.value; applyLang(); };
function applyLang(){ const t = i18n[lang]; document.getElementById("onlineLabel").innerText = t.online+":"; document.getElementById("addrLabel").innerText = t.addr+":"; document.getElementById("totalBetLabel").innerText = t.total; document.getElementById("winRateLabel").innerText = t.winRate; document.getElementById("profitLabel").innerText = t.profit; document.getElementById("refLabel").innerText = t.ref; document.getElementById("betAreaLabel").innerText = t.betArea; document.getElementById("tokenLabel").innerText = t.token; document.getElementById("amountLabel").innerText = t.amount; document.getElementById("adminLabel").innerText = t.admin; document.getElementById("controlLabel").innerText = t.control; document.getElementById("feeLabel").innerText = t.fee; document.getElementById("historyLabel").innerText = t.history; document.getElementById("connectBtn").innerText = document.getElementById("connectBtn").innerText.includes("连接")?t.connect:t.connected; document.getElementById("network").innerText = t.network; document.getElementById("copyRef").innerText = t.copy; document.getElementById("oddsLabel").innerText = t.odds; document.getElementById("refRewardLabel").innerText = t.refReward; document.getElementById("betSmall").innerText = "🎲 "+t.small+" 0-4"; document.getElementById("betBig").innerText = "🎲 "+t.big+" 5-9"; }

function genOnline(){ let base = 120+Math.floor(Math.random()*80); document.getElementById("onlineCount").innerText = base; setInterval(()=>{ base += Math.random()>0.5 ? 1 : -1; document.getElementById("onlineCount").innerText = Math.max(50, base); }, 5000); }
genOnline();

function slotAnim(text){ const box = document.getElementById("slotBox"); box.classList.add("slot-roll"); slotSound.play(); setTimeout(()=>{ box.innerText = text; box.classList.remove("slot-roll"); },800); }
function diceAnim(){ document.getElementById("title").classList.add("dice-shake"); setTimeout(()=>document.getElementById("title").classList.remove("dice-shake"),600); }
function winEffect(){ const box = document.getElementById("gameBox"); box.classList.add("win-flash"); setTimeout(()=>box.classList.remove("win-flash"),2200); }
function countAnim(id,val){ const el = document.getElementById(id); el.classList.add("number-animate"); el.innerText = val; setTimeout(()=>el.classList.remove("number-animate"),500); }

document.getElementById("connectBtn").onclick = connect;
async function connect(){ if(!window.ethereum)return alert("Please install MetaMask"); try{ provider = new ethers.BrowserProvider(window.ethereum); await provider.send("eth_requestAccounts",[]); signer = await provider.getSigner(); userAddress = await signer.getAddress(); contract = new ethers.Contract(CONTRACT_ADDRESS,ABI,signer); usdtContract = new ethers.Contract(USDT_ADDRESS,ERC20_ABI,signer); hashContract = new ethers.Contract(HASH_ADDRESS,ERC20_ABI,signer); usdtDecimals = await usdtContract.decimals().catch(()=>18); hashDecimals = await hashContract.decimals().catch(()=>18); const owner = await contract.owner().catch(()=>""); isOwner = owner.toLowerCase() === userAddress.toLowerCase(); updateInfo(); loadBalances(); loadHistory(); genRefLink(); setInterval(loadHistory, 10000); slotAnim("✅ 连接成功"); }catch(e){alert(e.message)} }

function updateInfo(){ document.getElementById("address").innerText = userAddress.slice(0,6)+"..."+userAddress.slice(-4); document.getElementById("connectBtn").innerText = i18n[lang].connected; document.getElementById("network").innerText = i18n[lang].network; }

async function loadBalances(){ const bnb = ethers.formatEther(await provider.getBalance(userAddress)); const usdt = ethers.formatUnits(await usdtContract.balanceOf(userAddress),usdtDecimals); const hash = ethers.formatUnits(await hashContract.balanceOf(userAddress),hashDecimals); document.getElementById("bnbBal").innerText = parseFloat(bnb).toFixed(3); document.getElementById("usdtBal").innerText = parseFloat(usdt).toFixed(3); document.getElementById("hashBal").innerText = parseFloat(hash).toFixed(3); }

document.getElementById("betSmall").onclick=()=>placeBet(0);
document.getElementById("betBig").onclick=()=>placeBet(1);
async function placeBet(choice){ if(!signer)return alert(lang==="zh"?"请连接钱包":"Connect first"); const token = document.getElementById("tokenType").value; const amt = document.getElementById("amount").value; if(!amt||amt<=0)return alert(lang==="zh"?"输入有效金额":"Enter valid amount"); betSound.volume=0.7; betSound.play(); diceAnim(); slotAnim("🎲 下注中..."); try{ if(token==="BNB"){ await contract.placeBetBNB(choice,{value:ethers.parseEther(amt)}); }else if(token==="USDT"){ const v=ethers.parseUnits(amt,usdtDecimals); await usdtContract.approve(CONTRACT_ADDRESS,v); await contract.placeBetUSDT(choice,v); }else{ const v=ethers.parseUnits(amt,hashDecimals); await hashContract.approve(CONTRACT_ADDRESS,v); await contract.placeBetHASH(choice,v); } slotAnim("✅ 下注成功"); loadHistory(); }catch(e){alert(e.message);slotAnim("❌ 失败");} }

async function settle(id){ try{ const tx=await contract.settleBet(id); await tx.wait(); const mode=document.getElementById("forceResult").value; if(mode=="1"&&isOwner){winSound.play();winEffect();slotAnim("🎉 恭喜胜利！");} loadHistory(); loadBalances(); }catch(e){alert(e.message)} }

async function loadHistory(){ const body=document.getElementById("historyBody"); body.innerHTML="<tr><td colspan=6 class='py-4 text-center'>加载中...</td></tr>"; let total=0,win=0,profit=0; try{ const max=await contract.nextBetId(); let list=[]; for(let i=0;i<Math.min(max,100);i++){ const d=await contract.bets(i); if(d[0].toLowerCase()===userAddress.toLowerCase())list.push({id:i,data:d}); } list=list.reverse(); body.innerHTML=""; for(let o of list){ const d=o.data; const tt=Number(d[6]); const token=tt===0?"BNB":tt===1?"USDT":"HASH"; const choice=d[2]==0?(lang==="zh"?"小":"Small"):(lang==="zh"?"大":"Big"); const status=d[4]==0?(lang==="zh"?"待结算":"Pending"):d[4]==1?(lang==="zh"?"胜":"Win"):(lang==="zh"?"负":"Lose"); let amt=tt===0?ethers.formatEther(d[1]):tt===1?ethers.formatUnits(d[1],usdtDecimals):ethers.formatUnits(d[1],hashDecimals); amt=parseFloat(amt).toFixed(3); total++; if(status==="Win"||status==="胜"){win++;winSound.play();winEffect();} if(status==="Win"||status==="胜")profit+=parseFloat(amt)*0.95; if(status==="Lose"||status==="负")profit-=parseFloat(amt); const tr=document.createElement("tr"); tr.className="border-b border-gray-800"; tr.innerHTML=` <td class="py-2">#${o.id}</td> <td class="py-2">${token}</td> <td class="py-2">${amt}</td> <td class="py-2">${choice}</td> <td class="py-2 ${status==="Win"||status==="胜"?"text-success":status==="Lose"||status==="负"?"text-danger":"text-warning"}">${status}</td> <td class="py-2">${status==="Pending"||status==="待结算"?`<button onclick="settle(${o.id})" class="text-xs bg-primary px-2 py-1 rounded">${lang==="zh"?"结算":"Settle"}</button>`:"-"}</td> `; body.appendChild(tr); } const rate=total>0?((win/total)*100).toFixed(1):0; countAnim("totalBets",total); countAnim("winRate",rate+"%"); countAnim("profit",profit.toFixed(3)); }catch(e){body.innerHTML="<tr><td colspan=6 class='py-4 text-center text-red-400'>加载失败</td></tr>"} }

function genRefLink(){ const link=window.location.origin+window.location.pathname+"?ref="+userAddress.slice(2,14); document.getElementById("refLink").value=link; }
document.getElementById("copyRef").onclick=()=>{ document.getElementById("refLink").select(); navigator.clipboard.writeText(document.getElementById("refLink").value); alert(lang==="zh"?"已复制":"Copied"); }

async function doWithdraw(t){ if(!isOwner)return alert(lang==="zh"?"无权限":"No permission"); const a=document.getElementById("withdrawAmt").value; if(!a||a<=0)return alert(lang==="zh"?"输入数量":"Enter amount"); try{ let v; if(t===0)v=ethers.parseEther(a); else if(t===1)v=ethers.parseUnits(a,usdtDecimals); else v=ethers.parseUnits(a,hashDecimals); await contract.withdrawPlatformFees(t,v); alert(lang==="zh"?"提取成功":"Withdraw success"); loadBalances(); }catch(e){alert(e.message)} }
document.getElementById("wBNB").onclick=()=>doWithdraw(0);
document.getElementById("wUSDT").onclick=()=>doWithdraw(1);
document.getElementById("wHASH").onclick=()=>doWithdraw(2);

document.getElementById("saveFee").onclick=()=>{ if(!isOwner)return alert(lang==="zh"?"无权限":"No permission"); const fee=document.getElementById("feeRate").value; if(!fee||fee<0||fee>10)return alert(lang==="zh"?"请输入0-10%":"0-10% only"); alert(lang==="zh"?"抽水比例已保存":"Fee saved"); };

applyLang();
</script>
</body>
</html>
