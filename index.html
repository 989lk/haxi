<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hash Dice</title>
<script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
<style>
    body{font-family:Arial,sans-serif;background:#101729;color:#e6e6e6;margin:0;padding:20px;}
    .box{max-width:420px;margin:30px auto;background:#1b243b;border-radius:16px;padding:24px;box-shadow:0 0 20px #0003;}
    h2{text-align:center;margin-bottom:20px;font-size:22px;}
    .btn{width:100%;padding:14px;border:none;border-radius:10px;background:#2563eb;color:#fff;font-size:16px;margin:10px 0;cursor:pointer;}
    .btn-sm{width:48%;padding:12px;}
    .input{width:100%;padding:12px;border-radius:10px;background:#101729;border:1px solid #334155;color:#fff;font-size:16px;margin:8px 0;}
    .row{display:flex;gap:8px;}
    .tip{color:#9ca3af;font-size:13px;margin:6px 0;}
    .log{background:#101729;padding:12px;border-radius:10px;margin-top:10px;font-size:14px;min-height:40px;line-height:1.4;}
</style>
</head>
<body>
<div class="box">
    <h2>Hash Dice</h2>

    <button class="btn" onclick="connect()">Connect Wallet</button>
    <div class="log" id="addr"></div>

    <div class="tip">Bet Amount</div>
    <input class="input" id="amt" value="0.001" placeholder="0.001">

    <div class="row">
        <button class="btn btn-sm" onclick="play(1)">Small 0-4</button>
        <button class="btn btn-sm" onclick="play(2)">Big 5-9</button>
    </div>

    <div class="tip">Game ID</div>
    <input class="input" id="gid" placeholder="Game ID">

    <div class="row">
        <button class="btn btn-sm" onclick="reveal()">Reveal</button>
        <button class="btn btn-sm" onclick="claim()">Claim</button>
    </div>

    <div class="log" id="log"></div>
</div>

<script>
// 只改这里！其他全部是你最早原版！
const CONTRACT = "0x15498249524fff253C7c4E60F22982487A737C80";
const USDT = "0x55D398C26D7BD02285B074434Aa690B7130832ef";
const RPC = "https://bsc-dataseed1.binance.org/";
const CHAINID = 56;

let web3, account, contract;

const ABI = [{"inputs":[],"stateMutability":"nonpayable","type":"constructor"},{"inputs":[],"name":"BNB","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"BLOCK_DELAY","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"HOUSE_FEE","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"REF_BONUS","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"USDT","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"address","name":"","type":"address"}],"name":"codeToOwner","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"uint256","name":"id","type":"uint256"}],"name":"games","outputs":[{"internalType":"address","name":"player","type":"address"},{"internalType":"address","name":"token","type":"address"},{"internalType":"uint256","name":"amount","type":"uint256"},{"internalType":"enum HashDice_Mainnet.Choice","name":"choice","type":"uint8"},{"internalType":"uint256","name":"betBlock","type":"uint256"},{"internalType":"uint256","name":"revealBlock","type":"uint256"},{"internalType":"uint256","name":"number","type":"uint256"},{"internalType":"bool","name":"isWin","type":"bool"},{"internalType":"bool","name":"claimed","type":"bool"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"gameId","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"getMyInviteCode","outputs":[{"internalType":"string","name":"","type":"string"}],"stateMutability":"nonpayable","type":"function"},{"inputs":[],"name":"getTokenList","outp ]}];

async function connect(){
    if(!window.ethereum)return alert("Install MetaMask");
    web3 = new Web3(window.ethereum);
    await window.ethereum.request({method:'eth_requestAccounts'});
    account = (await web3.eth.getAccounts())[0];
    contract = new web3.eth.Contract(ABI, CONTRACT);
    document.getElementById("addr").innerText = account;
}

async function play(choice){
    if(!account)return alert("Connect first");
    let amt = document.getElementById("amt").value;
    let val = web3.utils.toWei(amt,"ether");
    try{
        let tx = await contract.methods.bet(choice,"0x0000000000000000000000000000000000000000",val,"").send({from:account,value:val});
        let id = tx.events.GameCreated.returnValues.id;
        document.getElementById("gid").value = id;
        document.getElementById("log").innerText = "Bet OK ID:"+id;
    }catch(e){document.getElementById("log").innerText=e.message}
}

async function reveal(){
    let id = document.getElementById("gid").value;
    try{await contract.methods.reveal(id).send({from:account});document.getElementById("log").innerText="Reveal OK"}
    catch(e){document.getElementById("log").innerText=e.message}
}

async function claim(){
    let id = document.getElementById("gid").value;
    try{await contract.methods.claim(id).send({from:account});document.getElementById("log").innerText="Claim OK"}
    catch(e){document.getElementById("log").innerText=e.message}
}
</script>
</body>
</html>
