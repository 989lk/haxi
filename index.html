    body{background:#0b1220;color:#fff;padding:20px;max-width:480px;margin:0 auto}
    .card{background:#121a29;border-radius:12px;padding:20px;margin:12px 0}
    button{background:#0077fe;color:#fff;border:none;border-radius:8px;padding:12px 16px;margin:6px;width:100%;font-size:16px;cursor:pointer}
    button.gray{background:#2a3547}
    button.small{width:48%}
    input{width:100%;padding:12px;border-radius:8px;background:#2a3547;border:none;color:#fff;margin:8px 0;font-size:16px}

<body>

<h1>HashDice • 正式网</h1>
<div class="card">
  <button onclick="connectWallet()">连接钱包</button>
  <div id="status">未连接</div>
</div>

<div class="card">
  <h3>投注</h3>
  <input id="amount" placeholder="投注金额 0.001起" value="0.001">
  <button class="small" onclick="bet(1)">小 0-4</button>
  <button class="small" onclick="bet(2)">大 5-9</button>
</div>

<div class="card">
  <h3>开奖 & 领奖</h3>
  <input id="gameId" placeholder="输入游戏ID">
  <button onclick="reveal()">开奖</button>
  <button onclick="claim()">领奖</button>
</div>

<div class="card">
  <h3>邀请</h3>
  <button onclick="getInvite()">获取邀请码</button>
  <div id="inviteCode"></div>
</div>

// 连接钱包
async function connectWallet() {
  if(!window.ethereum) return alert("请安装MetaMask");
  web3 = new Web3(window.ethereum);
  const acc = await web3.eth.requestAccounts();
  account = acc[0];
  contract = new web3.eth.Contract(ABI, CONTRACT_ADDR);
  document.getElementById("status").innerText = "已连接："+account.slice(0,6)+"...";
}

// 投注 BNB
async function bet(choice) {
  if(!account) return alert("先连接钱包");
  const amount = document.getElementById("amount").value;
  const val = web3.utils.toWei(amount, "ether");
  try {
    await contract.methods.bet(choice, "0x0000000000000000000000000000000000000000", val, "").send({
      from: account, value: val
    });
    alert("投注成功！");
  } catch(e) { alert(e.message); }
}

// 开奖
async function reveal() {
  const id = document.getElementById("gameId").value;
  try {
    await contract.methods.reveal(id).send({from:account});
    alert("开奖成功");
  } catch(e) { alert(e.message) }
}

// 领奖
async function claim() {
  const id = document.getElementById("gameId").value;
  try {
    await contract.methods.claim(id).send({from:account});
    alert("领奖成功");
  } catch(e) { alert(e.message) }
}

// 邀请码
async function getInvite() {
  const code = await contract.methods.getMyInviteCode().send({from:account});
  document.getElementById("inviteCode").innerText = code;
}
</script>
