<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HashDice - 数字竞猜</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body {
    background: #0c0c1a;
    background-image: radial-gradient(circle at 20% 20%, rgba(40,30,90,0.3), transparent 40%),
                      radial-gradient(circle at 80% 80%, rgba(20,10,50,0.4), transparent 40%);
    color: #fff;
    min-height: 100vh;
  }
  .card {
    background: rgba(22,22,38,0.7);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    overflow: hidden;
  }
  .card-glow {
    position: relative;
  }
  .card-glow::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    border-radius: 20px;
    padding: 1px;
    background: linear-gradient(135deg, #4f46e5, #06b6d4, #4f46e5);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    opacity: 0.3;
    pointer-events: none;
  }
  .btn-primary {
    background: linear-gradient(90deg, #4f46e5, #06b6d4);
    border-radius: 16px;
    font-weight: 600;
    transition: all 0.2s;
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 20px rgba(79,70,229,0.35);
  }
  .btn-success {
    background: linear-gradient(90deg, #10b981, #059669);
    border-radius: 16px;
  }
  .btn-option {
    background: rgba(30,30,55,0.7);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
  }
  .btn-option:hover {
    background: rgba(45,45,80,0.7);
    border-color: rgba(79,70,229,0.4);
  }
  .stat-box {
    background: rgba(26,26,44,0.6);
    border-radius: 16px;
  }
  .marquee {
    background: rgba(30,30,55,0.5);
    border-radius: 12px;
    padding: 10px 16px;
    white-space: nowrap;
    overflow: hidden;
  }
  .marquee span {
    display: inline-block;
    animation: marquee 12s linear infinite;
  }
  @keyframes marquee {
    0% { transform: translateX(100%); }
    100% { transform: translateX(-100%); }
  }
  .history-item {
    background: rgba(24,24,40,0.6);
    border-radius: 12px;
  }
</style>
</head>

<body class="p-4 max-w-4xl mx-auto pb-24">

<!-- 顶部导航 -->
<div class="flex items-center justify-between mb-5">
  <div class="text-xl font-bold text-white">HashDice</div>
  <div class="flex gap-3">
    <button class="px-4 py-2 btn-primary text-sm" onclick="location.href='index.html'">竞猜</button>
    <button class="px-4 py-2 btn-option text-sm" onclick="location.href='xinyunlunpan.html'">轮盘</button>
  </div>
</div>

<!-- 公告 -->
<div class="marquee mb-5 text-sm">
  <span>🎉 恭喜用户 0x87** 赢得 5 倍大奖！｜ 平台抽水 2.5%，邀请返佣 10% 实时到账</span>
</div>

<!-- 钱包 -->
<div class="card card-glow p-5 mb-6">
  <button id="connectBtn" class="w-full py-4 btn-primary">连接钱包</button>
  <div id="addr" class="text-center text-gray-400 text-sm mt-3">未连接</div>
</div>

<!-- 资产 -->
<div class="grid grid-cols-3 gap-3 mb-6">
  <div class="stat-box p-4 text-center">
    <div class="text-gray-400 text-xs mb-1">BNB</div>
    <div id="bnbBal" class="text-lg font-semibold">0.0000</div>
  </div>
  <div class="stat-box p-4 text-center">
    <div class="text-gray-400 text-xs mb-1">USDT</div>
    <div id="usdtBal" class="text-lg font-semibold">0.0000</div>
  </div>
  <div class="stat-box p-4 text-center">
    <div class="text-gray-400 text-xs mb-1">HASH</div>
    <div id="hashBal" class="text-lg font-semibold">0.0000</div>
  </div>
</div>

<!-- 游戏区 -->
<div class="card card-glow p-6 mb-6">
  <h3 class="text-lg font-bold mb-5">数字竞猜</h3>
  <input id="amount" class="w-full p-4 rounded-xl bg-[#121220] border border-white/10 mb-4 text-lg" value="0.01" placeholder="下注金额">
  <select id="token" class="w-full p-4 rounded-xl bg-[#121220] border border-white/10 mb-5 text-lg">
    <option value="BNB">BNB</option>
    <option value="USDT">USDT</option>
    <option value="HASH">HASH</option>
  </select>
  <div class="flex gap-3 mb-5">
    <button id="low" class="flex-1 py-4 btn-option">小 0-4</button>
    <button id="high" class="flex-1 py-4 btn-option">大 5-9</button>
  </div>
  <button id="play" class="w-full py-4 btn-success text-lg">确认下注</button>
</div>

<!-- 最近记录 -->
<div class="card p-5 mb-6">
  <h4 class="font-semibold mb-3">最近结果</h4>
  <div id="history" class="space-y-2">
    <div class="history-item px-3 py-2 text-sm">等待数据...</div>
  </div>
</div>

<!-- 邀请 -->
<div class="card p-5">
  <h4 class="font-semibold mb-3">我的邀请</h4>
  <input id="ref" readonly class="w-full p-3 rounded-xl bg-[#121220] border border-white/10 text-sm">
</div>

<script>
let provider, signer, user;
let cfg = JSON.parse(localStorage.gameConfig||'{}');

async function connect(){
  if(!window.ethereum)return alert('请安装MetaMask');
  provider = new ethers.BrowserProvider(window.ethereum);
  await provider.send("eth_requestAccounts",[]);
  signer = await provider.getSigner();
  user = await signer.getAddress();
  addr.innerText = user.slice(0,6)+'...'+user.slice(-4);
  ref.value = location.origin+'/index.html?ref='+user;
}

connectBtn.onclick = connect;
play.onclick = ()=>{
  if(!user)return alert('请先连接钱包');
  let msg = ['小','大'][Math.random()>0.5?0:1];
  alert(`✅ 下注成功！\n结果：${msg}`);
  let dom = document.createElement('div');
  dom.className='history-item px-3 py-2 text-sm';
  dom.innerText = `${new Date().toLocaleTimeString()} | ${msg}`;
  history.prepend(dom);
  if(history.children.length>6) history.removeChild(history.lastChild);
}
</script>
</body>
</html>
