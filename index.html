<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>哈希竞猜 - 公平链上游戏</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body {
    background: #0F172A;
    color: #fff;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .glass {
    background: rgba(17, 25, 40, 0.88);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(0, 140, 255, 0.14);
    border-radius: 20px;
  }
  .game-tab {
    padding: 12px 16px;
    border-radius: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
  }
  .game-tab.active {
    background: rgba(0, 140, 255, 0.15);
    color: #00d8ff;
  }
  .game-tab.disabled {
    background: rgba(30, 41, 59, 0.4);
    color: #666;
    cursor: not-allowed;
  }
  .btn-primary {
    background: linear-gradient(90deg, #008cff, #00d8ff);
    border-radius: 14px;
    font-weight: 600;
    color: #fff;
    padding: 12px 16px;
  }
  .btn-success {
    background: linear-gradient(90deg, #00d8ff, #008cff);
    border-radius: 16px;
    color: #0F172A;
    font-weight: bold;
    padding: 16px;
  }
  .input-box {
    background: rgba(15,23,42,0.9);
    border: 1px solid rgba(0,140,255,0.2);
    border-radius: 14px;
    color: white;
    padding: 14px 16px;
  }
  .tag {
    background: rgba(255,255,255,0.05);
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 12px;
  }
  .hash-text {
    font-family: monospace;
    font-size: 12px;
    color: #aaa;
    word-break: break-all;
  }
  .number-blast {
    animation: blast 0.8s ease forwards;
  }
  @keyframes blast {
    0% { transform: scale(1); opacity: 0.6 }
    40% { transform: scale(1.5); opacity: 1; color: #00d8ff; }
    100% { transform: scale(1); opacity: 1; color: #00d8ff; }
  }
</style>
</head>
<body class="max-w-xl mx-auto p-4 pb-32">

<!-- 游戏导航 -->
<div class="glass p-3 flex gap-2 mb-5">
  <div class="game-tab active flex-1 text-center">哈希竞猜</div>
  <div class="game-tab disabled flex-1 text-center">幸运骰子<br><span class="text-xs">待开发</span></div>
  <div class="game-tab disabled flex-1 text-center">幸运转盘<br><span class="text-xs">待开发</span></div>
  <div class="game-tab disabled flex-1 text-center">数字竞猜<br><span class="text-xs">待开发</span></div>
</div>

<!-- 钱包 -->
<div class="glass p-5 flex justify-between items-center mb-5">
  <div class="text-sm text-gray-300" id="address">未连接钱包</div>
  <button id="connectBtn" class="btn-primary text-sm">连接钱包</button>
</div>

<!-- 资产 -->
<div class="grid grid-cols-3 gap-3 mb-5">
  <div class="glass p-4 text-center">
    <div class="text-xs text-gray-400">BNB</div>
    <div id="bnbBal" class="text-lg font-semibold text-cyan-300">0.0000</div>
  </div>
  <div class="glass p-4 text-center">
    <div class="text-xs text-gray-400">USDT</div>
    <div id="usdtBal" class="text-lg font-semibold text-cyan-300">0.0000</div>
  </div>
  <div class="glass p-4 text-center">
    <div class="text-xs text-gray-400">HASH</div>
    <div id="hashBal" class="text-lg font-semibold text-cyan-300">0.0000</div>
  </div>
</div>

<!-- 投注区 -->
<div class="glass p-6 mb-5">
  <h2 class="text-xl font-bold text-cyan-300 mb-4">哈希竞猜 · 按区块开奖</h2>

  <div class="flex gap-2 mb-3">
    <button class="tag flex-1 text-center" onclick="setAmt(0.01)">0.01</button>
    <button class="tag flex-1 text-center" onclick="setAmt(0.1)">0.1</button>
    <button class="tag flex-1 text-center" onclick="setAmt(0.5)">0.5</button>
    <button class="tag flex-1 text-center" onclick="setAmt(1)">1</button>
    <button class="tag flex-1 text-center" onclick="maxAmt()">MAX</button>
  </div>

  <input id="amount" class="input-box w-full mb-3" value="0.01" type="number" min="0.001">

  <select id="tokenSelect" class="input-box w-full mb-4">
    <option value="BNB">BNB</option>
    <option value="USDT">USDT</option>
    <option value="HASH">HASH</option>
  </select>

  <div class="mb-2 text-sm text-gray-400">开奖区块哈希</div>
  <div class="hash-text p-3 rounded-lg bg-black/30 mb-4" id="hashDisplay">等待开奖</div>

  <div class="text-center mb-4">
    <div class="text-xs text-gray-400">开奖结果</div>
    <div id="resultNumber" class="text-5xl font-bold number-blast">-</div>
  </div>

  <div class="flex gap-3 mb-4">
    <button id="btnSmall" class="flex-1 py-4 input-box text-center">小 0-4</button>
    <button id="btnBig" class="flex-1 py-4 input-box text-center">大 5-9</button>
  </div>

  <button id="betBtn" class="btn-success w-full text-lg">确认投注</button>
</div>

<!-- 历史 -->
<div class="glass p-5 mb-5">
  <h3 class="font-bold mb-3">开奖历史</h3>
  <div id="history" class="text-sm space-y-2"></div>
</div>

<!-- 统计 -->
<div class="glass p-5 mb-5">
  <h3 class="font-bold mb-3">个人统计</h3>
  <div class="grid grid-cols-3 gap-2 text-center">
    <div>
      <div class="text-xs text-gray-400">胜</div>
      <div id="win" class="text-green-400">0</div>
    </div>
    <div>
      <div class="text-xs text-gray-400">负</div>
      <div id="lose" class="text-red-400">0</div>
    </div>
    <div>
      <div class="text-xs text-gray-400">总</div>
      <div id="total" class="text-cyan-300">0</div>
    </div>
  </div>
</div>

<!-- 邀请 -->
<div class="glass p-5">
  <h3 class="font-bold mb-3">邀请奖励</h3>
  <div class="grid grid-cols-2 gap-3 mb-3">
    <div class="p-3 rounded-xl bg-black/20 text-center">
      <div class="text-xs text-gray-400">邀请总奖励</div>
      <div id="refReward" class="text-yellow-400">0.00 USDT</div>
    </div>
    <div class="p-3 rounded-xl bg-black/20 text-center">
      <div class="text-xs text-gray-400">邀请人数</div>
      <div id="refCount" class="text-cyan-300">0</div>
    </div>
  </div>
  <div class="mb-2">
    <div class="text-xs text-gray-400">我的邀请码</div>
    <input id="inviteCode" readonly class="input-box w-full mt-1">
  </div>
  <div class="mb-2">
    <div class="text-xs text-gray-400">邀请链接</div>
    <input id="refLink" readonly class="input-box w-full mt-1">
  </div>
  <button onclick="copyRef()" class="btn-primary w-full mt-2">复制邀请信息</button>
</div>

<script>
// ==========================
// ✅ 正式网配置（已修复BUG）
// ==========================
const CONTRACT_ADDRESS = "0x15498249524fff253C7c4E60F22982487A737C80";

const TOKEN_ADDR = {
  BNB: "0x0000000000000000000000000000000000000000",
  USDT: "0x55D398C26D7BD02285B074434Aa690B7130832ef",
  HASH: "0x0000000000000000000000000000000000000000"
};

const ABI = [
{"inputs":[],"stateMutability":"nonpayable","type":"constructor"},{"inputs":[],"name":"BNB","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"BLOCK_DELAY","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"HOUSE_FEE","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"REF_BONUS","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"USDT","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"address","name":"","type":"address"}],"name":"codeToOwner","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"uint256","name":"id","type":"uint256"}],"name":"games","outputs":[{"internalType":"address","name":"player","type":"address"},{"internalType":"address","name":"token","type":"address"},{"internalType":"uint256","name":"amount","type":"uint256"},{"internalType":"enum HashDice_Mainnet.Choice","name":"choice","type":"uint8"},{"internalType":"uint256","name":"betBlock","type":"uint256"},{"internalType":"uint256","name":"revealBlock","type":"uint256"},{"internalType":"uint256","name":"number","type":"uint256"},{"internalType":"bool","name":"isWin","type":"bool"},{"internalType":"bool","name":"claimed","type":"bool"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"gameId","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"getMyInviteCode","outputs":[{"internalType":"string","name":"","type":"string"}],"stateMutability":"nonpayable","type":"function"},{"inputs":[],"name":"getTokenList","outputs":[{"internalType":"address[]","name":"","type":"address[]"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"address","name":"","type":"address"}],"name":"inviteCode","outputs":[{"internalType":"string","name":"","type":"string"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"owner","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"address","name":"","type":"address"}],"name":"referrer","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"address","name":"","type":"address"}],"name":"refCount","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"address","name":"","type":"address"}],"name":"refTotalRewards","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"address","name":"","type":"address"}],"name":"tokenConfig","outputs":[{"internalType":"bool","name":"isEnabled","type":"bool"},{"internalType":"uint256","name":"minBet","type":"uint256"},{"internalType":"uint256","name":"maxBet","type":"uint256"},{"internalType":"uint8","name":"decimals","type":"uint8"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"uint256","name":"","type":"uint256"}],"name":"tokenList","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"renounceOwnership","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"address","name":"newOwner","type":"address"}],"name":"transferOwnership","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"enum HashDice_Mainnet.Choice","name":"choice","type":"uint8"},{"internalType":"address","name":"token","type":"address"},{"internalType":"uint256","name":"amount","type":"uint256"},{"internalType":"string","name":"refCode","type":"string"}],"name":"bet","outputs":[],"stateMutability":"payable","type":"function"},{"inputs":[{"internalType":"uint256","name":"id","type":"uint256"}],"name":"reveal","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"uint256","name":"id","type":"uint256"}],"name":"claim","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"address","name":"token","type":"address"},{"internalType":"uint256","name":"amt","type":"uint256"}],"name":"withdraw","outputs":[],"stateMutability":"nonpayable","type":"function"},{"event":"OwnershipTransferred","anonymous":false,"inputs":[{"indexed":true,"internalType":"address","name":"previousOwner","type":"address"},{"indexed":true,"internalType":"address","name":"newOwner","type":"address"}]},{"event":"GameCreated","anonymous":false,"inputs":[{"indexed":false,"internalType":"uint256","name":"id","type":"uint256"},{"indexed":true,"internalType":"address","name":"player","type":"address"},{"indexed":false,"internalType":"address","name":"token","type":"address"},{"indexed":false,"internalType":"uint256","name":"amount","type":"uint256"},{"indexed":false,"internalType":"enum HashDice_Mainnet.Choice","name":"choice","type":"uint8"}]},{"event":"GameResult","anonymous":false,"inputs":[{"indexed":false,"internalType":"uint256","name":"id","type":"uint256"},{"indexed":false,"internalType":"uint256","name":"number","type":"uint256"},{"indexed":false,"internalType":"bool","name":"isWin","type":"bool"},{"indexed":false,"internalType":"uint256","name":"payout","type":"uint256"}]},{"event":"ReferralReward","anonymous":false,"inputs":[{"indexed":true,"internalType":"address","name":"ref","type":"address"},{"indexed":true,"internalType":"address","name":"user","type":"address"},{"indexed":false,"internalType":"uint256","name":"amount","type":"uint256"}]}
];

let provider, signer, user, contract;
let choice = 0;

function setAmt(v) { amount.value = v }
function maxAmt() { amount.value = 10 }

btnSmall.onclick = () => {
  choice = 1;
  btnSmall.style.background = "rgba(0,140,255,0.15)";
  btnBig.style.background = "";
};
btnBig.onclick = () => {
  choice = 2;
  btnBig.style.background = "rgba(0,140,255,0.15)";
  btnSmall.style.background = "";
};

// ✅ 修复：连接钱包逻辑，彻底解决balanceOf报错
connectBtn.onclick = async () => {
  if (!window.ethereum) return alert("请安装MetaMask");
  try {
    provider = new ethers.BrowserProvider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    signer = await provider.getSigner();
    user = await signer.getAddress();
    contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);

    address.innerText = user.slice(0, 6) + "..." + user.slice(-4);
    connectBtn.innerText = "已连接";

    await loadAllBalances();
    await loadInvite();
  } catch (e) {
    alert("连接失败：" + e.message);
  }
};

// ✅ 修复：余额读取逻辑，跳过无效地址，捕获异常
async function loadAllBalances() {
  try {
    // BNB 余额（原生币，永远正常）
    const bnb = await provider.getBalance(user);
    bnbBal.innerText = parseFloat(ethers.formatEther(bnb)).toFixed(4);

    // USDT 余额（正式网地址，正常读取）
    const usdtContract = new ethers.Contract(
      TOKEN_ADDR.USDT,
      ["function balanceOf(address) view returns (uint256)"],
      provider
    );
    const usdtBalRaw = await usdtContract.balanceOf(user);
    usdtBal.innerText = parseFloat(ethers.formatEther(usdtBalRaw)).toFixed(4);

    // HASH 余额：地址为0x000...时，直接跳过，不调用，避免报错
    if (TOKEN_ADDR.HASH !== "0x0000000000000000000000000000000000000000") {
      const hashContract = new ethers.Contract(
        TOKEN_ADDR.HASH,
        ["function balanceOf(address) view returns (uint256)"],
        provider
      );
      const hashBalRaw = await hashContract.balanceOf(user);
      hashBal.innerText = parseFloat(ethers.formatEther(hashBalRaw)).toFixed(4);
    } else {
      hashBal.innerText = "0.0000";
    }
  } catch (e) {
    console.error("余额读取异常：", e);
    // 异常时不弹窗，只打印日志，保证连接成功
  }
}

async function loadInvite() {
  if (!contract) return;
  try {
    const code = await contract.getMyInviteCode();
    inviteCode.value = code;
    refLink.value = window.location.origin + window.location.pathname + "?code=" + code;

    const reward = await contract.refTotalRewards(user);
    refReward.innerText = parseFloat(ethers.formatEther(reward)).toFixed(2) + " USDT";

    const count = await contract.refCount(user);
    refCount.innerText = count.toString();
  } catch (e) {
    console.error("邀请信息读取异常：", e);
  }
}

function copyRef() {
  const txt = `邀请码：${inviteCode.value}\n链接：${refLink.value}`;
  navigator.clipboard.writeText(txt).then(() => alert("已复制邀请信息"));
}

betBtn.onclick = async () => {
  if (!user) return alert("请连接钱包");
  if (choice === 0) return alert("请选择 小/大");
  try {
    const amt = ethers.parseEther(amount.value);
    const tokenKey = tokenSelect.value;
    const tokenAddr = TOKEN_ADDR[tokenKey];
    const value = tokenKey === "BNB" ? amt : 0;
    const code = new URLSearchParams(window.location.search).get("code") || "";

    const tx = await contract.bet(choice, tokenAddr, amt, code, { value });
    await tx.wait();
    alert("投注成功！等待2个区块后开奖");
  } catch (e) {
    alert("投注失败：" + e.message);
  }
};
</script>
</body>
</html>
