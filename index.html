<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HashDice - 数字竞猜</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body {
  background: #0c0c1a;
  background-image: radial-gradient(circle at 20% 20%, rgba(48,32,100,0.35), transparent 45%),
                    radial-gradient(circle at 80% 80%, rgba(22,12,60,0.4), transparent 45%);
  color: #fff;
  min-height: 100vh;
}
.card {
  background: rgba(22,22,40,0.65);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  overflow: hidden;
}
.card-glow {
  position: relative;
}
.card-glow::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  border-radius: 20px;
  padding: 1px;
  background: linear-gradient(135deg, #4f46e5, #06b6d4, #4f46e5);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  opacity: 0.4;
  pointer-events: none;
}
.btn-primary {
  background: linear-gradient(90deg, #4f46e5, #06b6d4);
  border-radius: 14px;
  font-weight: 600;
  transition: all 0.25s ease;
}
.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 0 18px rgba(79,70,229,0.35);
}
.btn-success {
  background: linear-gradient(90deg, #10b981, #059669);
  border-radius: 14px;
  transition: all 0.25s ease;
}
.btn-success:hover {
  transform: translateY(-1px);
  box-shadow: 0 0 18px rgba(16,185,129,0.3);
}
.btn-option {
  background: rgba(30,30,60,0.5);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  transition: all 0.25s ease;
}
.btn-option:hover {
  background: rgba(40,40,80,0.6);
  border-color: rgba(79,70,229,0.4);
}
.stat-box {
  background: rgba(26,26,44,0.5);
  border-radius: 16px;
  backdrop-filter: blur(10px);
}
.marquee {
  background: rgba(30,30,60,0.4);
  border-radius: 12px;
  padding: 10px 16px;
  white-space: nowrap;
  overflow: hidden;
}
.marquee span {
  display: inline-block;
  animation: marquee 14s linear infinite;
}
@keyframes marquee {
  0% { transform: translateX(100%); }
  100% { transform: translateX(-100%); }
}
.history-item {
  background: rgba(24,24,42,0.5);
  border-radius: 12px;
  backdrop-filter: blur(6px);
}
</style>
</head>
<body class="p-4 max-w-4xl mx-auto pb-24">

<div class="flex items-center justify-between mb-5">
  <div class="text-xl font-bold text-white">HashDice</div>
  <div class="flex gap-3">
    <button class="px-4 py-2 btn-primary text-sm">竞猜</button>
    <button class="px-4 py-2 btn-option text-sm" onclick="location.href='xinyunlunpan.html'">轮盘</button>
  </div>
</div>

<div class="marquee mb-5 text-sm">
  <span>🎉 恭喜用户 0x87** 赢得 5 倍大奖！｜ 平台抽水 2.5%，邀请返佣 10% 实时到账｜公平可验</span>
</div>

<div class="card card-glow p-5 mb-6 text-center">
  <button id="connectBtn" class="px-5 py-2.5 btn-primary text-sm">连接钱包</button>
  <div id="addr" class="text-gray-400 text-xs mt-3">未连接</div>
</div>

<div class="grid grid-cols-3 gap-3 mb-6">
  <div class="stat-box p-4 text-center">
    <div class="text-gray-400 text-xs mb-1">BNB</div>
    <div id="bnbBal" class="text-lg font-semibold">0.0000</div>
  </div>
  <div class="stat-box p-4 text-center">
    <div class="text-gray-400 text-xs mb-1">USDT</div>
    <div id="usdtBal" class="text-lg font-semibold">0.0000</div>
  </div>
  <div class="stat-box p-4 text-center">
    <div class="text-gray-400 text-xs mb-1">HASH</div>
    <div id="hashBal" class="text-lg font-semibold">0.0000</div>
  </div>
</div>

<div class="card card-glow p-6 mb-6">
  <h3 class="text-lg font-bold mb-5">数字竞猜</h3>
  <input id="amount" class="w-full p-4 rounded-xl bg-[#121225] border border-white/10 mb-4 text-lg" value="0.01">
  <select id="token" class="w-full p-4 rounded-xl bg-[#121225] border border-white/10 mb-5 text-lg">
    <option value="BNB">BNB</option>
    <option value="USDT">USDT</option>
    <option value="HASH">HASH</option>
  </select>
  <div class="flex gap-3 mb-5">
    <button id="low" class="flex-1 py-4 btn-option">小 0-4</button>
    <button id="high" class="flex-1 py-4 btn-option">大 5-9</button>
  </div>
  <button id="play" class="w-full py-4 btn-success text-lg">确认下注</button>
</div>

<div class="card p-5 mb-6">
  <h4 class="font-semibold mb-3">最近结果</h4>
  <div id="history" class="space-y-2">
    <div class="history-item px-3 py-2 text-sm">等待数据...</div>
  </div>
</div>

<div class="card p-5">
  <h4 class="font-semibold mb-3">我的邀请</h4>
  <input id="ref" readonly class="w-full p-3 rounded-xl bg-[#121225] border border-white/10 text-sm">
</div>

<script>
let provider, signer, user;
async function connect(){
  if(!window.ethereum)return alert('请安装MetaMask');
  provider = new ethers.BrowserProvider(window.ethereum);
  await provider.send("eth_requestAccounts",[]);
  signer = await provider.getSigner();
  user = await signer.getAddress();
  addr.innerText = user.slice(0,6)+'...'+user.slice(-4);
}
connectBtn.onclick = connect;

play.onclick = ()=>{
  if(!user)return alert('请先连接钱包');
  let msg = ['小','大'][Math.random()>0.5?0:1];
  alert(`✅ 下注成功！\n结果：${msg}`);
  let dom = document.createElement('div');
  dom.className='history-item px-3 py-2 text-sm';
  dom.innerText = `${new Date().toLocaleTimeString()} | ${msg}`;
  history.prepend(dom);
  if(history.children.length>6) history.removeChild(history.lastChild);
}
</script>
</body>
</html>
