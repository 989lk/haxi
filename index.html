<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>终局 · HASH</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    background: #0F0F11;
    color: #EAEAEA;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding-bottom: 60px;
  }
  .container {
    max-width: 420px;
    margin: 0 auto;
    padding: 20px;
  }
  .header {
    text-align: center;
    padding: 20px 0;
    font-size: 24px;
    font-weight: 600;
    color: #D4AF37;
    letter-spacing: 1px;
  }
  .section {
    background: #141417;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
    border: 1px solid #222;
  }
  .section-title {
    font-size: 14px;
    color: #999;
    margin-bottom: 12px;
  }
  .btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 8px;
    background: linear-gradient(90deg, #1A1A22, #111);
    color: #EAEA;
    border: 1px solid #333;
  }
  .btn-primary {
    background: linear-gradient(90deg, #D4AF37, #B48F27);
    color: #111;
  }
  .input {
    width: 100%;
    padding: 14px 16px;
    background: #0A0A0D;
    border: 1px solid #222;
    border-radius: 12px;
    color: #EEE;
    font-size: 15px;
    margin-bottom: 12px;
  }
  .result-box {
    background: #0A0A0D;
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    margin-top: 12px;
    font-size: 18px;
    color: #D4AF37;
    font-weight: 600;
  }
  .footer {
    text-align: center;
    color: #666;
    font-size: 12px;
    padding: 20px 0;
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">终局 · HASH</div>

  <div class="section">
    <div class="section-title">连接终局</div>
    <button class="btn btn-primary" id="connectWallet">连接钱包</button>
  </div>

  <div class="section">
    <div class="section-title">投入额度</div>
    <input class="input" id="betAmount" placeholder="请输入投入额度">
    <button class="btn" id="betSmall">小</button>
    <button class="btn" id="betBig">大</button>
  </div>

  <div class="section">
    <div class="section-title">终局结算</div>
    <div class="result-box" id="finalResult">等待终局</div>
  </div>

  <div class="section">
    <div class="section-title">终局记录</div>
    <div id="historyList">暂无记录</div>
  </div>

  <div class="footer">终局 · HASH © 2025 终局纪元</div>
</div>

<script>
// 连接钱包
document.getElementById('connectWallet').addEventListener('click', () => {
  document.getElementById('connectWallet').innerText = '已连接钱包';
  document.getElementById('finalResult').innerText = '已进入终局';
});

// 押小
document.getElementById('betSmall').addEventListener('click', () => {
  document.getElementById('finalResult').innerText = '终局：小';
  let his = document.createElement('div');
  his.innerText = '终局：小 · 胜出';
  document.getElementById('historyList').appendChild(his);
});

// 押大
document.getElementById('betBig').addEventListener('click', () => {
  document.getElementById('finalResult').innerText = '终局：大';
  let his = document.createElement('div');
  his.innerText = '终局：大 · 胜出';
  document.getElementById('historyList').appendChild(his);
});
</script>

</body>
</html>
