<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理员后台</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-4 max-w-xl mx-auto">

<h1 class="text-xl font-bold mb-4">管理员后台</h1>

<div class="bg-gray-800 p-4 rounded-lg mb-4">
<button id="connect" class="w-full bg-blue-500 py-2 rounded-lg mb-2">连接钱包</button>
<div id="addr" class="text-sm text-center text-gray-400">未连接</div>
</div>

<div class="bg-gray-800 p-4 rounded-lg mb-4">
<h3 class="mb-2">游戏合约地址</h3>
<input id="game" class="w-full p-2 bg-gray-700 rounded-lg mb-2" placeholder="游戏合约地址">
</div>

<div class="bg-gray-800 p-4 rounded-lg mb-4">
<h3 class="mb-2">USDT 合约地址</h3>
<input id="usdt" class="w-full p-2 bg-gray-700 rounded-lg mb-2" placeholder="USDT合约">
</div>

<div class="bg-gray-800 p-4 rounded-lg mb-4">
<h3 class="mb-2">HASH 合约地址</h3>
<input id="hash" class="w-full p-2 bg-gray-700 rounded-lg mb-2" placeholder="HASH合约">
</div>

<button id="save" class="w-full bg-green-500 py-3 rounded-lg mb-4">保存并全局生效</button>

<div class="bg-gray-800 p-4 rounded-lg">
<h3 class="mb-2">平台资金提取</h3>
<button class="w-full bg-yellow-500 py-2 rounded-lg mb-2">提取 BNB</button>
<button class="w-full bg-yellow-500 py-2 rounded-lg mb-2">提取 USDT</button>
<button class="w-full bg-yellow-500 py-2 rounded-lg">提取 HASH</button>
</div>

<script>
let old = JSON.parse(localStorage.getItem('gameConfig')) || {};
document.getElementById('game').value = old.game || '';
document.getElementById('usdt').value = old.usdt || '';
document.getElementById('hash').value = old.hash || '';

document.getElementById('save').onclick = ()=>{
  localStorage.setItem('gameConfig', JSON.stringify({
    game: document.getElementById('game').value.trim(),
    usdt: document.getElementById('usdt').value.trim(),
    hash: document.getElementById('hash').value.trim()
  }));
  alert("保存成功！全站已生效！");
};

document.getElementById('connect').onclick = async ()=>{
  const p = new ethers.BrowserProvider(window.ethereum);
  await p.send("eth_requestAccounts", []);
  const s = await p.getSigner();
  document.getElementById('addr').innerText = await s.getAddress();
};
</script>
</body>
</html>
