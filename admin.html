<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台 - HashDice</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body {
  background: #0c0c1a;
  color: #fff;
}
.card {
  background: rgba(22,22,38,0.8);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 20px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.25);
}
.input-box {
  background: #121225;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
}
.btn-primary {
  background: linear-gradient(90deg, #4f46e5, #06b6d4);
  border-radius: 16px;
}
.btn-warning {
  background: linear-gradient(90deg, #f59e0b, #d97706);
  border-radius: 16px;
}
</style>
</head>

<body class="p-5 max-w-xl mx-auto">
<h1 class="text-2xl font-bold mb-6">HashDice 管理后台</h1>

<div class="card p-6 mb-6">
  <button id="connect" class="w-full py-4 btn-primary text-lg">连接管理员钱包</button>
  <div id="addr" class="text-center text-gray-400 mt-3">未连接</div>
</div>

<div class="card p-6 mb-6">
  <h3 class="font-semibold mb-4">合约配置</h3>
  <div class="mb-4">
    <label class="text-sm text-gray-400 block mb-2">游戏合约</label>
    <input id="game" class="w-full p-3 input-box">
  </div>
  <div class="mb-4">
    <label class="text-sm text-gray-400 block mb-2">USDT 合约</label>
    <input id="usdt" class="w-full p-3 input-box">
  </div>
  <div class="mb-4">
    <label class="text-sm text-gray-400 block mb-2">HASH 合约</label>
    <input id="hash" class="w-full p-3 input-box">
  </div>
  <button id="save" class="w-full py-4 btn-primary text-lg">保存配置</button>
</div>

<div class="card p-6">
  <h3 class="font-semibold mb-4">资金提取</h3>
  <button class="w-full py-4 btn-warning mb-3 text-lg">提取 BNB</button>
  <button class="w-full py-4 btn-warning mb-3 text-lg">提取 USDT</button>
  <button class="w-full py-4 btn-warning text-lg">提取 HASH</button>
</div>

<script>
let c = JSON.parse(localStorage.gameConfig||'{}');
game.value = c.game||''; usdt.value = c.usdt||''; hash.value = c.hash||'';

save.onclick = ()=>{
  localStorage.gameConfig = JSON.stringify({
    game:game.value.trim(), usdt:usdt.value.trim(), hash:hash.value.trim()
  });
  alert('✅ 保存成功！全站已生效');
};

connect.onclick = async ()=>{
  const p = new ethers.BrowserProvider(window.ethereum);
  await p.send("eth_requestAccounts",[]);
  addr.innerText = await (await p.getSigner()).getAddress();
};
</script>
</body>
</html>
